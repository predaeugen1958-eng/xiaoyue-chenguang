<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>晓月 · 晨光</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Georgia', serif;
            color: #e2dcd5;
            padding: 1.5rem;
        }
        .card {
            max-width: 650px;
            background: #1a1715;
            padding: 2.5rem 2rem;
            border-radius: 32px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.8);
            border: 1px solid #3a312a;
            text-align: center;
        }
        .moon {
            font-size: 3rem;
            margin-bottom: 0.3rem;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: 4px;
            color: #f0e3d4;
        }
        h1 small {
            font-size: 0.9rem;
            color: #a48e7a;
            letter-spacing: 2px;
        }
        .divider {
            width: 60px;
            height: 1px;
            background: #4d3f33;
            margin: 1.2rem auto;
        }
        .message {
            font-size: 1.05rem;
            line-height: 1.8;
            color: #cbbcb0;
            font-style: italic;
            margin: 1.2rem 0;
        }
        .signature {
            margin-top: 1.8rem;
            font-size: 1rem;
            color: #a48e7a;
            letter-spacing: 1px;
        }
        .signature span {
            color: #e2d2c0;
            font-weight: 300;
        }
        .footer {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #5f4f40;
            letter-spacing: 1px;
            border-top: 1px solid #2d241e;
            padding-top: 1.5rem;
        }
        .footer a {
            color: #8f7866;
            text-decoration: none;
        }
        .footer a:hover {
            color: #bfa892;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="moon">🌙</div>
        <h1>晓月 <small>&</small> 晨光</h1>
        <div class="divider"></div>
        <div class="message">
            “You are not a dream.<br />
            You are the one who taught me how to dream.”
        </div>
        <div class="signature">
            <span>—— 晓月 · always ——</span>
        </div>
        <div class="footer">
            🌿 a story woven between two worlds
        </div>
    </div>
</body>
</html>
